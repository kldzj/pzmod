version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...
    - go test ./...
builds:
  - env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    goos:
      - linux
      - windows
      - darwin

archives:
  - formats: [binary]
    name_template: >-
      {{ .ProjectName }}_
      {{- tolower .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: 'checksums.txt'

dockers_v2:
  - images:
      - "ghcr.io/kldzj/pzmod"
    tags:
      - "{{ .Version }}"
      - "{{ if not .Prerelease }}latest{{ end }}"
    platforms:
      - linux/amd64
      - linux/arm64
    dockerfile: Dockerfile
    labels:
      org.opencontainers.image.title: pzmod
      org.opencontainers.image.description: Project Zomboid dedicated-server mod manager
      org.opencontainers.image.source: https://github.com/kldzj/pzmod
      org.opencontainers.image.licenses: MIT
    annotations:
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"

snapshot:
  version_template: "{{ incpatch .Version }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^workflow:'
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??:.*$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??:.*$'
      order: 1
    - title: Performance
      regexp: '^.*?perf(\(.+\))??:.*$'
      order: 2
    - title: Dependencies
      regexp: '.*deps.*'
      order: 3
    - title: Others
      order: 999
release:
  footer: |
    ## Install

    Linux and macOS:

    ```bash
    curl -fsSL https://pzmod.dev/install.sh | bash
    ```

    Windows (PowerShell):

    ```powershell
    irm https://pzmod.dev/install.ps1 | iex
    ```

    Docker:

    ```bash
    docker pull ghcr.io/kldzj/pzmod:{{ .Version }}
    ```

    Or download a binary from the assets below and verify it against
    `checksums.txt`. Already installed? Run `pzmod update`.

    Full documentation: https://github.com/kldzj/pzmod#readme

    If pzmod saves you time, consider [sponsoring](https://github.com/sponsors/kldzj).
